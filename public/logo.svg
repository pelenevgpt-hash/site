<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Фон -->
  <rect width="200" height="300" fill="#f2efe6"></rect>

  <!-- Основание -->
  <rect x="20" y="200" width="160" height="60" fill="#c62828"></rect>

  <!-- Левая и правая башни -->
  <rect x="20" y="160" width="30" height="40" fill="#c62828"></rect>
  <rect x="150" y="160" width="30" height="40" fill="#c62828"></rect>

  <!-- Основная ступенчатая часть -->
  <rect x="50" y="140" width="100" height="60" fill="#c62828"></rect>
  <rect x="65" y="110" width="70" height="30" fill="#c62828"></rect>
  <rect x="80" y="80" width="40" height="30" fill="#c62828"></rect>

  <!-- Шпиль -->
  <rect x="97" y="40" width="6" height="40" fill="#c62828"></rect>

  <!-- Звезда -->
  <polygon fill="#c62828" points="100,20 104,30 115,30 106,36 110,46 100,40 90,46 94,36 85,30 96,30"></polygon>
</svg>